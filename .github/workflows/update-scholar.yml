name: Update Google Scholar Stats

on:
  schedule:
    - cron: '7 3 * * 1'  # every Monday at 03:07 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install 'scholarly[proxy]'

    - name: Run scholar scraper
      run: python scripts/scholar.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add scholar_stats.json
        git commit -m "Automated update of Google Scholar stats" || echo "No changes to commit"
        git push
